<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador WOM-PTI</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <aside id="panel">
    <header class="encabezado-app">
      <h1>Buscador WOM-PTI</h1>
      <p>Búsqueda de sitios WOM y PTI cercanos</p>
    </header>

    <section>
      <label for="input-id">Buscar sitio por ID, comuna o región</label>

      <div class="contenedor-autocompletado">
        <div class="grupo-busqueda">
          <input
            id="input-id"
            type="text"
            placeholder="Ejemplo: AN0900"
            autocomplete="off"
          >
          <button id="btn-buscar" type="button">Buscar</button>
        </div>

        <div id="sugerencias" class="sugerencias oculto"></div>
      </div>

      <p id="mensaje"></p>
    </section>

    <hr>

    <section>
      <label for="input-radio">Radio de búsqueda</label>
      <div class="grupo-radio">
        <input
          id="input-radio"
          type="range"
          min="50"
          max="5000"
          step="50"
          value="400"
        >
        <strong><span id="valor-radio">400</span> m</strong>
      </div>
    </section>

    <hr>

    <section id="detalle-sitio">
      <h2>Sitio seleccionado</h2>
      <p>Busca un ID o selecciona un punto en el mapa.</p>
    </section>

    <hr>

    <section id="estadisticas">
      <h2>Estadísticas</h2>
      <p class="estado-carga">
        Selecciona un sitio para calcular estadísticas.
      </p>
    </section>

    <hr>

    <section id="resultado-pti">
      <h2>PTI cercanos</h2>
      <p class="estado-carga">Cargando PTI.csv...</p>
    </section>

    <hr>

    <section class="acciones-panel">
      <button id="btn-volver-sitio" class="boton-secundario" type="button" disabled>
        Volver al sitio WOM
      </button>

      <button id="btn-copiar-enlace" class="boton-secundario" type="button" disabled>
        Copiar enlace del sitio
      </button>

      <button id="btn-exportar" class="boton-exportar" type="button" disabled>
        Exportar resultados a CSV
      </button>
    </section>
  </aside>

  <main id="map"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
